# ═══════════════════════════════════════════════════════════════════
# HRMS Docker Compose — Production Configuration
# ═══════════════════════════════════════════════════════════════════
# Usage:
#   docker compose up -d              # Start all services
#   docker compose logs -f backend    # Follow backend logs
#   docker compose exec backend sh    # Shell into backend
#   docker compose down -v            # Stop & remove volumes
# ═══════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: hrms-db
    restart: unless-stopped
    init: true
    stop_grace_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-aljamieat_alwasatia}"
      POSTGRES_USER: "${POSTGRES_USER:-aljamieat}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aljamieat} -d ${POSTGRES_DB:-aljamieat_alwasatia}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - hrms
    sysctls:
      net.core.somaxconn: 1024
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ── Django Backend ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hrms-backend
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    read_only: true
    tmpfs:
      - /tmp:size=100M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:?Set DJANGO_ALLOWED_HOSTS in .env}"
      DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS:?Set DJANGO_CSRF_TRUSTED_ORIGINS in .env}"
      DJANGO_SECURE_SSL_REDIRECT: "${DJANGO_SECURE_SSL_REDIRECT:-True}"
      DJANGO_SESSION_COOKIE_SECURE: "${DJANGO_SESSION_COOKIE_SECURE:-True}"
      DJANGO_CSRF_COOKIE_SECURE: "${DJANGO_CSRF_COOKIE_SECURE:-True}"
      DJANGO_SECURE_HSTS_SECONDS: "${DJANGO_SECURE_HSTS_SECONDS:-31536000}"
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: "${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS:-True}"
      DJANGO_SECURE_HSTS_PRELOAD: "${DJANGO_SECURE_HSTS_PRELOAD:-True}"
      POSTGRES_DB: "${POSTGRES_DB:-aljamieat_alwasatia}"
      POSTGRES_USER: "${POSTGRES_USER:-aljamieat}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
      POSTGRES_HOST: "db"
      POSTGRES_PORT: "5432"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    networks:
      - hrms
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  # ── Nginx Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrms-frontend
    restart: unless-stopped
    init: true
    stop_grace_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - hrms
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
      update_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

# ═══════════════════════════════════════════════════════════════════
# Volumes — Persistent Data
# ═══════════════════════════════════════════════════════════════════
volumes:
  postgres_data:
    driver: local
  media_data:
    driver: local
  static_data:
    driver: local

# ═══════════════════════════════════════════════════════════════════
# Networks — Isolated Bridge
# ═══════════════════════════════════════════════════════════════════
networks:
  hrms:
    driver: bridge
    name: hrms-network
